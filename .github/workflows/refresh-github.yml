name: Refresh GitHub snapshot

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh js/github-data.js
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: bash scripts/refresh-github.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet js/github-data.js; then
            git add js/github-data.js
            git commit -m "chore: refresh GitHub activity snapshot"
            git push
          else
            echo "No changes."
          fi
